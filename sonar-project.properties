sonar.projectKey=zaibaitech_asrar-mobile
sonar.organization=zaibaitech

# Project info
sonar.projectName=Asrar Mobile
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=app,components,constants,contexts,data,hooks,services,utils
sonar.tests=scripts

# Language settings
sonar.language=ts
sonar.sourceEncoding=UTF-8

# TypeScript/JavaScript
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/coverage/**,\
  **/.expo/**,\
  **/android/**,\
  **/ios/**,\
  **/dist/**,\
  **/build/**,\
  **/*.config.js,\
  **/*.config.ts,\
  **/babel.config.js,\
  **/metro.config.js

# Test exclusions
sonar.test.exclusions=\
  **/node_modules/**,\
  **/.expo/**,\
  **/android/**,\
  **/ios/**

# Duplicate detection exclusions
sonar.cpd.exclusions=\
  **/data/**
